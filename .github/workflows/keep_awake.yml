name: Keep Dashboard Awake

on:
  schedule:
    # Runs at minute 0 past every 8th hour
    - cron: "0 */8 * * *"
  workflow_dispatch: # Allows you to click a button in GitHub to run it manually

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # Replace the URL below with your actual dashboard link
        run: curl -sL "https://medical-surge-radar-wuvpukrvhzx6lfeez2ihu9.streamlit.app" > /dev/null
