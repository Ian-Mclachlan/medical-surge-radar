name: Keep Dashboard Awake

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit health endpoint
        env:
          URL: https://medical-surge-radar-wuvpukrvhzx61feez2ihu9.streamlit.app/_stcore/health
        run: |
          set -euo pipefail
          echo "Pinging $URL"
          curl -sS \
            --max-redirs 5 \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 30 \
            -A "Mozilla/5.0 (GitHubActions; keepalive)" \
            -o /dev/null \
            -w "http_code=%{http_code} time_total=%{time_total}s\n" \
            "$URL"
